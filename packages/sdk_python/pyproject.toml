[project]
name = "bluegill-sdk"
version = "0.1.0"
description = "An SDK for working with with the Bluegill API."
dependencies = [
    "pydantic>=2.7.4",
    "httpx>=0.27.0",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]