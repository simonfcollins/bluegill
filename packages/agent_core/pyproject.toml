[project]
name = "bluegill-agent"
version = "0.1.0"
description = "Bluegill AI agent logic."
dependencies = [
    "pydantic>=2.7.4",
    "httpx>=0.27.0",
    "openai>=1.35.10",
    "anthropic>=0.34.0"
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
"bluegill_agent" = ["**/*.txt", "**/*.md"]